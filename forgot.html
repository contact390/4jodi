<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4jodi Matrimony - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        h2 {
            text-align: center;
            color: #ff3366;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #ff3366;
            box-shadow: 0 0 0 3px rgba(255, 51, 102, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff3366, #ff6b6b);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 51, 102, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .otp-section, .password-section {
            display: none;
        }
        .otp-section.active, .password-section.active {
            display: block;
        }
        .otp-input-group {
            display: flex;
            gap: 10px;
        }
        .otp-input-group input {
            text-align: center;
            font-size: 20px;
            letter-spacing: 5px;
        }
        .otp-input-group button {
            width: auto;
            padding: 14px 20px;
        }
        .resend-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
        }
        .resend-link a {
            color: #ff3366;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .resend-link a:hover {
            text-decoration: underline;
        }
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            color: #ff3366;
        }
        .password-strength {
            height: 5px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }
        .strength-weak { width: 33%; background: #ff3366; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }
        .timer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password</h2>
        <p class="subtitle">Reset your password securely</p>
        
        <div id="message" class="message" style="display: none;"></div>

        <!-- Step 1: Email Input -->
        <div id="emailSection" class="email-section">
            <div class="form-group">
                <label for="email">📧 Enter your registered email:</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <button id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="otpSection" class="otp-section">
            <div class="form-group">
                <label for="otp">🔢 Enter 6-digit OTP:</label>
                <div class="otp-input-group">
                    <input type="text" id="otp" maxlength="6" placeholder="000000" required>
                    <button id="verifyOtpBtn" onclick="verifyOTP()">Verify</button>
                </div>
            </div>
            <div class="timer" id="timer"></div>
            <div class="resend-link">
                Didn't receive OTP? <a onclick="resendOTP()">Resend</a>
            </div>
        </div>

        <!-- Step 3: New Password -->
        <div id="passwordSection" class="password-section">
            <div class="form-group">
                <label for="newPassword">🔑 New Password:</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">🔑 Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button id="resetPasswordBtn" onclick="resetPassword()">Reset Password</button>
        </div>

        <div class="back-link">
            <a href="login2.html">← Back to Login</a>
        </div>
    </div>

    <script>
        let otpExpiryTime = null;
        let timerInterval = null;
        let verifiedEmail = null;

        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        async function sendOTP() {
            const email = document.getElementById('email').value.trim();
            const sendOtpBtn = document.getElementById('sendOtpBtn');

            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            sendOtpBtn.disabled = true;
            sendOtpBtn.textContent = 'Sending...';

            try {
                const res = await fetch('http://localhost:5000/api/forgot-password/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('✅ OTP sent to your email!', 'success');
                    document.getElementById('emailSection').style.display = 'none';
                    document.getElementById('otpSection').classList.add('active');
                    verifiedEmail = email;
                    startTimer(120); // 2 minutes
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = 'Send OTP';
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('❌ Server error. Please try again.', 'error');
                sendOtpBtn.disabled = false;
                sendOtpBtn.textContent = 'Send OTP';
            }
        }

        function startTimer(seconds) {
            let remaining = seconds;
            const timerEl = document.getElementById('timer');
            
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                timerEl.textContent = `⏱️ Resend available in ${mins}:${secs.toString().padStart(2, '0')}`;
                remaining--;

                if (remaining < 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = '';
                }
            }, 1000);
        }

        async function resendOTP() {
            const email = verifiedEmail || document.getElementById('email').value.trim();
            
            if (!email) {
                showMessage('Please enter your email first', 'error');
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/api/forgot-password/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('✅ OTP resent to your email!', 'success');
                    startTimer(120);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                }
            } catch (err) {
                showMessage('❌ Server error. Please try again.', 'error');
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value.trim();
            const verifyOtpBtn = document.getElementById('verifyOtpBtn');

            if (!otp || otp.length !== 6) {
                showMessage('Please enter a valid 6-digit OTP', 'error');
                return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.textContent = 'Verifying...';

            try {
                const res = await fetch('http://localhost:5000/api/forgot-password/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: verifiedEmail, otp })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('✅ OTP verified successfully!', 'success');
                    document.getElementById('otpSection').classList.remove('active');
                    document.getElementById('passwordSection').classList.add('active');
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = '';
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.textContent = 'Verify';
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('❌ Server error. Please try again.', 'error');
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.textContent = 'Verify';
            }
        }

        // Password strength indicator
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            
            strengthBar.className = 'password-strength-bar';
            
            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) {
                    strengthBar.classList.add('strength-strong');
                } else if (/[A-Z]/.test(password) || /[0-9]/.test(password)) {
                    strengthBar.classList.add('strength-medium');
                } else {
                    strengthBar.classList.add('strength-weak');
                }
            } else if (password.length > 0) {
                strengthBar.classList.add('strength-weak');
            }
        });

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetPasswordBtn');

            if (!newPassword) {
                showMessage('Please enter a new password', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('❌ Passwords do not match', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('http://localhost:5000/api/forgot-password/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: verifiedEmail, password: newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('✅ Password reset successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'login2.html';
                    }, 1500);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Reset Password';
                }
            } catch (err) {
                console.error('Error:', err);
                showMessage('❌ Server error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        }

        // Allow Enter key to trigger actions
        document.getElementById('otp').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyOTP();
            }
        });

        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                resetPassword();
            }
        });
    </script>
</body>
</html>
