
<!-- Chatbot Float Button (Right Bottom) -->
<button id="chatbot-open-btn" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  background: linear-gradient(135deg, #2863e8 0%, #1e5cc4 100%);
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(40, 99, 232, 0.4);
  transition: all 0.3s ease;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
" title="Chat with us">💬</button>

<!-- Chatbot Modal Overlay -->
<div id="chatbot-modal-overlay" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 9998;
"></div>

<!-- Chatbot Modal Container -->
<div id="chatbot-modal" style="
  position: fixed;
  bottom: 85px;
  right: 20px;
  width: 380px;
  height: 550px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 40px rgba(0,0,0,0.3);
  display: none;
  flex-direction: column;
  z-index: 9999;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
">
  <!-- Header -->
  <div style="
    background: linear-gradient(135deg, #2863e8 0%, #1e5cc4 100%);
    color: white;
    padding: 16px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 15px;
  ">
    <span><span style="margin-right: 8px;">💬</span>4Jodi Chat</span>
    <button id="chatbot-close-btn" style="
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      cursor: pointer;
      font-size: 20px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    ">×</button>
  </div>

  <!-- Messages -->
  <div id="chatbot-msgs" style="
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f9fafb;
  ">
    <div style="padding: 10px; text-align: center; color: #999; font-size: 12px;">
      👋 Hi! Ask about cement, bricks, steel or any materials!
    </div>
  </div>

  <!-- Input -->
  <div style="
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid #e5e7eb;
    background: white;
  ">
    <input 
      type="text" 
      id="chatbot-txt-input" 
      style="
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
        font-family: inherit;
      "
      placeholder="Type message..."
      autocomplete="off"
    />
    <button id="chatbot-send-btn" style="
      padding: 10px 15px;
      background: #2863e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s ease;
    ">Send</button>
  </div>
</div>

<style>
  #chatbot-msgs::-webkit-scrollbar {
    width: 5px;
  }
  #chatbot-msgs::-webkit-scrollbar-track {
    background: #f1f1f1;
  }
  #chatbot-msgs::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 3px;
  }
  #chatbot-msgs::-webkit-scrollbar-thumb:hover {
    background: #555;
  }

  .chatbot-message {
    margin-bottom: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.4;
    word-wrap: break-word;
    animation: chatMsgSlide 0.3s ease-out;
  }

  @keyframes chatMsgSlide {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .chatbot-message.user {
    background: #e8f3ff;
    color: #0066cc;
    margin-left: 25px;
    text-align: right;
    border-bottom-right-radius: 2px;
  }

  .chatbot-message.bot {
    background: #f0f1f3;
    color: #19222d;
    margin-right: 25px;
    border-bottom-left-radius: 2px;
  }

  #chatbot-open-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(40, 99, 232, 0.6);
  }

  #chatbot-open-btn:active {
    transform: scale(0.95);
  }

  @media (max-width: 480px) {
    #chatbot-modal {
      width: calc(100vw - 20px) !important;
      height: 70vh !important;
      max-height: 550px !important;
      bottom: 70px !important;
      right: 10px !important;
    }

    .chatbot-message.user {
      margin-left: 15px;
    }

    .chatbot-message.bot {
      margin-right: 15px;
    }
  }
</style>

<script>
  // Chatbot Keywords Database
 const chatbotDB = {
  "hi": "Hello! Welcome to 4Jodi Matrimony 💖 How can I help you today?",
  "hello": "Hi there! Looking for your perfect match? 😊",
  "how are you": "I'm doing great! Ready to help you find your life partner 💕",
  "good morning": "Good morning! Hope today brings you closer to your perfect match 🌸",
  "good night": "Good night! Sweet dreams and happy matchmaking 💖",
  "thank you": "You're welcome! I'm always here to help 😊",
  "bye": "Goodbye! Wishing you success in finding your perfect partner 💕",

  "what's your name": "I'm your 4Jodi Matrimony Assistant 🤖",
  "who created you": "I was created by the 4Jodi team to help you find your perfect match 💖",

  // 🔍 Profile & Matches
  "match|matches|find match|search partner": "You can search for matches based on age, location, religion, and preferences. Try using filters to find your perfect partner 💕",
  "profile|create profile|register|signup": "Create your profile in simple steps and start finding matches instantly. Click on 'Register' to begin 🚀",
  "edit profile|update profile": "You can update your profile anytime from your dashboard to get better matches 👍",

  // 💕 Interest & Communication
  "interest|send interest|express interest": "You can send interest to profiles you like. Once accepted, you can start chatting 💬",
  "chat|message|talk": "Start chatting with your matches once they accept your interest 💕",
  "shortlist|save profile": "You can shortlist profiles to view them later easily ⭐",

  // 🔐 Verification & Trust
  "verification|verified|is it safe|real profiles": "We encourage profile verification to ensure genuine and trusted matches ✔️",
  "fake profile|scam|safety": "We take safety seriously. You can report any suspicious profiles, and our team will review them immediately 🚨",

  // 💰 Pricing
  "price|cost|membership|premium": "Basic browsing is free. Premium plans allow you to contact and chat with matches 💎",
  "free|is it free": "Yes! You can register and browse profiles for free. Premium features are optional 👍",
  "subscription|plan": "We offer affordable plans to connect with your matches. Contact us for details 💰",

  // 📍 Location & Preferences
  "location|city|search by city": "You can filter matches by city, state, or country to find nearby partners 📍",
  "religion|caste|community": "You can search matches based on religion, caste, and community preferences 🙏",

  // 👨‍👩‍👧 Family & Details
  "family|details|background": "Profiles include family details, education, and profession to help you choose better 👨‍👩‍👧",
  "job|education": "You can view partner’s education and profession details in their profile 🎓",

  // 📦 Account & Support
  "login|account|dashboard": "Login to your account to manage your profile, matches, and interests 📊",
  "delete account": "You can request account deletion from settings or contact support for help ❌",

  // 🚚 Contact & Help
  "contact|support|help|phone|email": "You can contact our support team via phone, WhatsApp, or email for assistance 📞",
  "how to use|guide": "Register → Create Profile → Search Matches → Send Interest → Start Chat 💡",

  // 🎉 Extras
  "success stories|marriage|couples": "We have many happy success stories! You could be next 💑",
  "tips|advice|how to find partner": "Be honest in your profile, upload a good photo, and communicate clearly 💖",

  "thanks|thank you|appreciate": "You're welcome! Wishing you a happy journey on 4Jodi Matrimony 💕"
};// DOM Elements
  const openBtn = document.getElementById('chatbot-open-btn');
  const closeBtn = document.getElementById('chatbot-close-btn');
  const modal = document.getElementById('chatbot-modal');
  const overlay = document.getElementById('chatbot-modal-overlay');
  const msgsDiv = document.getElementById('chatbot-msgs');
  const inputTxt = document.getElementById('chatbot-txt-input');
  const sendBtn = document.getElementById('chatbot-send-btn');

  // Open chatbot
  function openChat() {
    modal.style.display = 'flex';
    overlay.style.display = 'block';
    inputTxt.focus();
  }

  // Close chatbot
  function closeChat() {
    modal.style.display = 'none';
    overlay.style.display = 'none';
  }

  // Add message
  function addMsg(text, isUser) {
    const msg = document.createElement('div');
    msg.className = `chatbot-message ${isUser ? 'user' : 'bot'}`;
    msg.textContent = text;
    msgsDiv.appendChild(msg);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
  }

  // Find response
  function getResponse(userMsg) {
    const normalized = userMsg.trim().toLowerCase();
    for (const [keys, response] of Object.entries(chatbotDB)) {
      const keywordList = keys.split('|');
      if (keywordList.some(kw => normalized.includes(kw.trim()))) {
        return response;
      }
    }
    return "I'm not sure how to respond to that. Can you try something else?";
  }

  // Send message
  async function sendMsg() {
    const msg = inputTxt.value.trim();
    if (!msg) return;

    inputTxt.value = '';
    addMsg(msg, true);

    await new Promise(r => setTimeout(r, 500));
    addMsg(getResponse(msg), false);
  }

  // Event Listeners
  openBtn.addEventListener('click', openChat);
  closeBtn.addEventListener('click', closeChat);
  overlay.addEventListener('click', closeChat);
  sendBtn.addEventListener('click', sendMsg);
  inputTxt.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMsg();
    }
  });

  // Close with Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'flex') {
      closeChat();
    }
  });

  // Hover effect for button
  openBtn.addEventListener('mouseover', () => {
    openBtn.style.transform = 'scale(1.1)';
    openBtn.style.boxShadow = '0 6px 20px rgba(40, 99, 232, 0.6)';
  });

  openBtn.addEventListener('mouseout', () => {
    openBtn.style.transform = 'scale(1)';
    openBtn.style.boxShadow = '0 4px 12px rgba(40, 99, 232, 0.4)';
  });
</script>
